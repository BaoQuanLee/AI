<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FX · Chuyển Đổi Tiền Tệ Thế Giới</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;
  --surf:#0d1118;
  --surf2:#131920;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --accent:#b5ff45;
  --accent-bg:rgba(181,255,69,0.08);
  --accent-border:rgba(181,255,69,0.22);
  --result:#3de8c8;
  --result-bg:rgba(61,232,200,0.07);
  --text:#e4eaf0;
  --textdim:#9aa5b4;
  --muted:#55636f;
  --red:#ff5757;
  --red-bg:rgba(255,87,87,0.08);
  --red-border:rgba(255,87,87,0.2);
  --r:14px;
  --shadow:0 24px 64px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04);
}
body{
  font-family:'Manrope',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:36px 16px 80px;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);
  background-size:26px 26px;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;
  top:-30%;left:50%;transform:translateX(-50%);
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(181,255,69,0.025) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
header,main,footer{position:relative;z-index:1;width:100%;max-width:580px;}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;padding:0 2px;
}
.logo{
  font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;
  color:var(--accent);letter-spacing:-0.03em;
}
.logo em{color:var(--muted);font-style:normal;}
.live-badge{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:0.06em;text-transform:uppercase;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.75)}}

/* CARDS */
main{display:flex;flex-direction:column;gap:14px;}
.card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);padding:26px;
}

/* AMOUNT */
.field-label{
  font-size:10px;font-weight:800;color:var(--muted);
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;
}
.amount-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:11px;padding:4px 5px 4px 16px;
  transition:border-color 0.2s;
}
.amount-wrap:focus-within{border-color:var(--accent-border);}
.amount-input{
  flex:1;min-width:0;
  font-family:'Instrument Serif',serif;font-style:italic;font-size:30px;
  color:var(--text);background:transparent;border:none;outline:none;
}
.amount-input::placeholder{color:var(--muted);}
.from-tag{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-border);
  border-radius:8px;padding:7px 11px;white-space:nowrap;flex-shrink:0;
  transition:all 0.2s;
}

/* PAIR ROW */
.pair-row{
  display:grid;grid-template-columns:1fr 48px 1fr;
  align-items:end;gap:10px;margin:18px 0;
}
.currency-col{display:flex;flex-direction:column;gap:6px;}

/* DROPDOWN */
.dropdown{position:relative;}
.trigger{
  display:flex;align-items:center;gap:9px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:11px;padding:10px 12px;cursor:pointer;
  transition:border-color 0.2s,background 0.15s;user-select:none;
}
.trigger:hover,.trigger.open{border-color:var(--border2);}
.trigger.open{border-color:var(--accent-border);}
.t-flag{font-size:20px;line-height:1;flex-shrink:0;}
.t-info{flex:1;min-width:0;}
.t-code{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;
  color:var(--text);line-height:1.25;
}
.t-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-chevron{color:var(--muted);flex-shrink:0;transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);}
.trigger.open .t-chevron{transform:rotate(180deg);}

.panel{
  position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:300;
  background:var(--surf2);border:1px solid var(--border2);
  border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,0.65);
  display:none;flex-direction:column;overflow:hidden;
}
.panel.open{display:flex;animation:panelIn 0.18s cubic-bezier(.34,1.56,.64,1);}
@keyframes panelIn{from{opacity:0;transform:translateY(-6px) scale(0.975)}to{opacity:1;transform:none}}

.psearch{padding:9px;border-bottom:1px solid var(--border);}
.psearch input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Manrope',sans-serif;
  font-size:12px;padding:7px 10px;outline:none;transition:border-color 0.2s;
}
.psearch input:focus{border-color:var(--accent-border);}
.psearch input::placeholder{color:var(--muted);}
.plist{overflow-y:auto;max-height:256px;}
.plist::-webkit-scrollbar{width:3px;}
.plist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
.group-lbl{
  font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);padding:8px 12px 3px;border-top:1px solid var(--border);
}
.group-lbl:first-child{border-top:none;}
.pitem{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;cursor:pointer;transition:background 0.1s;
}
.pitem:hover{background:rgba(181,255,69,0.05);}
.pitem.active{background:rgba(181,255,69,0.09);}
.pi-flag{font-size:17px;line-height:1;flex-shrink:0;}
.pi-code{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  color:var(--text);width:34px;flex-shrink:0;
}
.pi-name{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pempty{padding:20px;text-align:center;font-size:12px;color:var(--muted);}

/* SWAP */
.swap-btn{
  width:48px;height:48px;border-radius:50%;
  background:var(--bg);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;align-self:flex-end;
}
.swap-btn:hover{
  border-color:var(--accent-border);color:var(--accent);
  background:var(--accent-bg);transform:rotate(180deg);
}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0 18px;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-eq{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:20px;color:var(--muted);
}

/* RESULT */
.result-section{text-align:center;padding-bottom:4px;}
.result-number{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:clamp(44px,9vw,68px);color:var(--result);
  line-height:1.05;letter-spacing:-0.02em;
  display:block;min-height:72px;
  transition:opacity 0.15s;
}
.result-number.dim{opacity:0.25;}
.result-code{
  font-family:'JetBrains Mono',monospace;font-style:normal;
  font-size:15px;font-weight:600;color:var(--result);
  opacity:0.55;margin-left:6px;vertical-align:super;
}
.result-rates{
  display:flex;justify-content:center;gap:18px;
  margin-top:10px;flex-wrap:wrap;
}
.rate-chip{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--muted);background:var(--surf2);
  border:1px solid var(--border);border-radius:6px;
  padding:4px 9px;white-space:nowrap;
}
.rate-chip b{color:var(--textdim);font-weight:600;}
.rate-date{
  margin-top:10px;font-size:10px;font-weight:600;
  color:var(--muted);letter-spacing:0.04em;
}

/* ERROR */
.err-box{
  display:none;margin-top:16px;
  background:var(--red-bg);border:1px solid var(--red-border);
  border-radius:9px;padding:11px 15px;
  font-size:12px;color:var(--red);text-align:center;
}
.err-box.show{display:block;}

/* QUICK CARD */
.quick-card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);padding:20px 22px;
}
.quick-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.quick-title{
  font-size:10px;font-weight:800;color:var(--muted);
  letter-spacing:0.1em;text-transform:uppercase;
}
.quick-from-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--muted);
}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qi{
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:10px 11px;
  transition:border-color 0.15s,background 0.15s;
}
.qi:hover{border-color:var(--border2);background:#0a0f16;}
.qi-flag{font-size:15px;line-height:1;margin-bottom:3px;}
.qi-code{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  color:var(--muted);margin-bottom:3px;
}
.qi-amt{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:14px;color:var(--result);line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.qi-amt.dim{color:var(--muted);opacity:0.4;}

/* FOOTER */
footer{
  margin-top:28px;text-align:center;
  font-size:11px;color:var(--muted);line-height:2;
}
footer a{color:var(--muted);text-decoration:underline;text-decoration-color:rgba(255,255,255,0.12);}
footer a:hover{color:var(--textdim);}

/* RESPONSIVE */
@media(max-width:500px){
  .card{padding:18px 16px;}
  .quick-grid{grid-template-columns:repeat(2,1fr);}
  .amount-input{font-size:26px;}
  .result-number{font-size:42px;min-height:54px;}
  .pair-row{grid-template-columns:1fr 40px 1fr;gap:8px;}
  .swap-btn{width:40px;height:40px;}
}
</style>
</head>

</header>

<main>

    </div>

    <div class="pair-row">
      <!-- FROM -->
      <div class="currency-col">
        <div class="field-label">Từ</div>
        <div class="dropdown" id="dd-from">
          <div class="trigger" id="tr-from">
            <span class="t-flag" id="fl-from">🇺🇸</span>
            <div class="t-info">
              <div class="t-code" id="cd-from">USD</div>
              <div class="t-name" id="nm-from">Đô la Mỹ</div>

          </div>
          <div class="panel" id="pn-from">
            <div class="psearch"><input type="text" id="sr-from" placeholder="Tìm tiền tệ..." autocomplete="off"/></div>
            <div class="plist" id="pl-from"></div>
          </div>
        </div>
      </div>

      <!-- SWAP -->
      <button class="swap-btn" id="swapBtn" title="Hoán đổi">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 11V3m0 0L2 5.5m2.5-2.5L7 5.5"/><path d="M12.5 6v8m0 0l2.5-2.5M12.5 14l-2.5-2.5"/>
        </svg>
      </button>

      <!-- TO -->
      <div class="currency-col">
        <div class="field-label">Sang</div>
        <div class="dropdown" id="dd-to">
          <div class="trigger" id="tr-to">
            <span class="t-flag" id="fl-to">🇻🇳</span>
            <div class="t-info">
              <div class="t-code" id="cd-to">VND</div>
              <div class="t-name" id="nm-to">Đồng Việt Nam</div>
            </div>
            <svg class="t-chevron" width="11" height="7" viewBox="0 0 11 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 1l4.5 4.5L10 1"/></svg>
          </div>
          <div class="panel" id="pn-to">
            <div class="psearch"><input type="text" id="sr-to" placeholder="Tìm tiền tệ..." autocomplete="off"/></div>
            <div class="plist" id="pl-to"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-eq">=</div>
      <div class="div-line"></div>
    </div>

    <div class="result-section">
      <span class="result-number dim" id="resNum">—</span>
      <div class="result-rates" id="resRates"></div>
      <div class="rate-date" id="resDate"></div>
    </div>

    <div class="err-box" id="errBox"></div>
  </div>

  <!-- Quick convert card -->
  <div class="quick-card">
    <div class="quick-header">
      <div class="quick-title">Quy đổi nhanh</div>
      <div class="quick-from-lbl" id="qFromLbl">100 USD →</div>
    </div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>
</main>

  TZS:'TZ',UAH:'UA',UGX:'UG',USD:'US',UYU:'UY',UZS:'UZ',VES:'VE',VND:'VN',
  VUV:'VU',WST:'WS',XAF:'CF',XCD:'AG',XOF:'SN',XPF:'PF',YER:'YE',ZAR:'ZA',
  ZMW:'ZM',ZWL:'ZW'
};

const POPULAR = ['USD','EUR','VND','GBP','JPY','CNY','KRW','AUD','CAD','CHF','SGD','THB','MYR','HKD','INR','NZD'];
const QUICK   = ['EUR','GBP','JPY','CNY','KRW','AUD','CAD','SGD','CHF','THB','MYR','HKD'];
const NO_DEC  = new Set(['VND','JPY','KRW','IDR','KHR','PYG','UGX','BIF','DJF','GNF','KMF','MGA','RWF','XAF','XOF','XPF','CLP','GIP','SLL','SLE']);

// ── UTILS ──────────────────────────────────────────────────────────────────
function flag(code) {
  const cc = CC[code];
  if (!cc) return '💱';
  if (cc === 'EU') return '🇪🇺';
  return [...cc].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
}

function fmt(n, cur) {
  if (n == null || isNaN(n)) return '—';
  const decimals = NO_DEC.has(cur) ? 0 : n >= 100 ? 2 : n >= 1 ? 4 : 6;
  try {
    return new Intl.NumberFormat('vi-VN', {minimumFractionDigits:0, maximumFractionDigits:decimals}).format(n);
  } catch(e) {
    return n.toLocaleString();
  }
}

function cname(code) { return NAMES[code] || code; }

// ── STATE ──────────────────────────────────────────────────────────────────
const cache  = {};   // code → {rates, ts}
const CACHE_TTL = 3600000; // 1h

let selFrom = 'USD';
let selTo   = 'VND';
let allCodes = Object.keys(NAMES).sort();
let debounce = null;

// ── API ────────────────────────────────────────────────────────────────────
async function getRates(base) {
  const now = Date.now();
  if (cache[base] && (now - cache[base].ts) < CACHE_TTL) return cache[base].rates;
  const r = await fetch('https://open.er-api.com/v6/latest/' + base);
  if (!r.ok) throw new Error('Lỗi API (' + r.status + ')');
  const d = await r.json();
  if (d.result !== 'success') throw new Error('Dữ liệu không hợp lệ');
  cache[base] = {rates: d.rates, ts: now, updated: d.time_last_update_utc};
  // Merge API codes with our list
  const apiCodes = Object.keys(d.rates);
  const merged = [...new Set([...allCodes, ...apiCodes])].sort();
  allCodes = merged;
  return d.rates;
}

// ── DROPDOWN ───────────────────────────────────────────────────────────────
function buildList(side, q = '') {
  const el   = document.getElementById('pl-' + side);
  const cur  = side === 'from' ? selFrom : selTo;
  const ql   = q.toLowerCase();
  const pop  = POPULAR.filter(c => allCodes.includes(c));
  const rest = allCodes.filter(c => !POPULAR.includes(c));
  const all  = [...pop.map(c=>({c,g:1})), ...rest.map(c=>({c,g:0}))];
  const fil  = ql
    ? all.filter(({c}) => c.toLowerCase().includes(ql) || cname(c).toLowerCase().includes(ql))
    : all;

  el.innerHTML = '';
  if (!fil.length) { el.innerHTML = '<div class="pempty">Không tìm thấy</div>'; return; }

  let lastG = -1;
  fil.forEach(({c, g}) => {
    if (!ql && g !== lastG) {
      lastG = g;
      const lbl = document.createElement('div');
      lbl.className = 'group-lbl';
      lbl.textContent = g ? '★ Phổ biến' : '◦ Tất cả';
      el.appendChild(lbl);
    }
    const item = document.createElement('div');
    item.className = 'pitem' + (c === cur ? ' active' : '');
    item.innerHTML = `<span class="pi-flag">${flag(c)}</span><span class="pi-code">${c}</span><span class="pi-name">${cname(c)}</span>`;
    item.addEventListener('click', () => pick(side, c));
    el.appendChild(item);
  });
}

function openDD(side) {
  const isOpen = document.getElementById('pn-' + side).classList.contains('open');
  closeDD('from'); closeDD('to');
  if (isOpen) return;
  document.getElementById('tr-' + side).classList.add('open');
  document.getElementById('pn-' + side).classList.add('open');
  const sr = document.getElementById('sr-' + side);
  sr.value = '';
  buildList(side);
  setTimeout(() => sr.focus(), 40);
}

function closeDD(side) {
  document.getElementById('tr-' + side).classList.remove('open');
  document.getElementById('pn-' + side).classList.remove('open');
}

function pick(side, code) {
  if (side === 'from') {
    selFrom = code;
    document.getElementById('fl-from').textContent = flag(code);
    document.getElementById('cd-from').textContent = code;
    document.getElementById('nm-from').textContent = cname(code);
    document.getElementById('fromTag').textContent = code;
    closeDD('from');
  } else {
    selTo = code;
    document.getElementById('fl-to').textContent = flag(code);
    document.getElementById('cd-to').textContent = code;
    document.getElementById('nm-to').textContent = cname(code);
    closeDD('to');
  }
  buildList('from'); buildList('to');
  doConvert();
}

['from','to'].forEach(side => {
  document.getElementById('tr-' + side).addEventListener('click', e => {
    e.stopPropagation(); openDD(side);
  });
  document.getElementById('pn-' + side).addEventListener('click', e => e.stopPropagation());
  document.getElementById('sr-' + side).addEventListener('input', e => buildList(side, e.target.value));
});
document.addEventListener('click', () => { closeDD('from'); closeDD('to'); });

document.getElementById('swapBtn').addEventListener('click', () => {
  [selFrom, selTo] = [selTo, selFrom];
  ['from','to'].forEach(side => {
    const c = side === 'from' ? selFrom : selTo;
    document.getElementById('fl-' + side).textContent = flag(c);
    document.getElementById('cd-' + side).textContent = c;
    document.getElementById('nm-' + side).textContent = cname(c);
  });
  document.getElementById('fromTag').textContent = selFrom;
  doConvert();
});

document.getElementById('amtInput').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(doConvert, 280);
});

// ── CONVERSION ─────────────────────────────────────────────────────────────
function showErr(msg) {
  const b = document.getElementById('errBox');
  b.textContent = msg;
  b.classList.add('show');
}
function hideErr() { document.getElementById('errBox').classList.remove('show'); }

function setStatus(ok) {
  const dot = document.getElementById('liveDot');
  const txt = document.getElementById('liveText');
  if (ok === null) {
    dot.style.background = 'var(--accent)';
    txt.textContent = 'Đang tải...';
  } else if (ok) {
    dot.style.background = 'var(--accent)';
    txt.textContent = 'Tỷ giá thực';
  } else {
    dot.style.background = 'var(--red)';
    txt.textContent = 'Lỗi kết nối';
  }
}

function renderQuick(amt, rates) {
  const grid = document.getElementById('quickGrid');
  const label = document.getElementById('qFromLbl');
  const targets = QUICK.filter(c => c !== selFrom).slice(0, 8);
  label.textContent = fmt(amt, selFrom) + ' ' + selFrom + ' →';

  if (!rates || !amt) {
    grid.innerHTML = targets.map(c => `
      <div class="qi">
        <div class="qi-flag">${flag(c)}</div>
        <div class="qi-code">${c}</div>
        <div class="qi-amt dim">—</div>
      </div>`).join('');
    return;
  }

  grid.innerHTML = targets.map(c => {
    const r = rates[c];
    const val = r ? fmt(amt * r, c) : '—';
    return `
      <div class="qi">
        <div class="qi-flag">${flag(c)}</div>
        <div class="qi-code">${c}</div>
        <div class="qi-amt${r ? '' : ' dim'}">${val}</div>
      </div>`;
  }).join('');
}

async function doConvert() {
  const amtEl  = document.getElementById('amtInput');
  const resEl  = document.getElementById('resNum');
  const rateEl = document.getElementById('resRates');
  const dateEl = document.getElementById('resDate');
  const amt    = parseFloat(amtEl.value);

  hideErr();

  if (!amt || amt <= 0 || isNaN(amt)) {
    resEl.textContent = '—';
    resEl.classList.add('dim');
    rateEl.innerHTML = '';
    dateEl.textContent = '';
    renderQuick(0, null);
    return;
  }

  if (selFrom === selTo) {
    resEl.classList.remove('dim');
    resEl.innerHTML = fmt(amt, selTo) + '<span class="result-code">' + selTo + '</span>';
    rateEl.innerHTML = '<div class="rate-chip">1 ' + selFrom + ' = <b>1 ' + selTo + '</b></div>';
    renderQuick(amt, Object.fromEntries(QUICK.map(c => [c, null])));
    return;
  }

  resEl.classList.add('dim');
  resEl.textContent = '...';
  setStatus(null);
  renderQuick(amt, null);

  try {
    const rates = await getRates(selFrom);
    const rate  = rates[selTo];
    if (!rate) throw new Error('Không có tỷ giá cho ' + selFrom + '/' + selTo);

    const converted = amt * rate;
    resEl.classList.remove('dim');
    resEl.innerHTML = fmt(converted, selTo) + '<span class="result-code">' + selTo + '</span>';

    rateEl.innerHTML = `
      <div class="rate-chip">1 ${selFrom} = <b>${fmt(rate, selTo)} ${selTo}</b></div>
      <div class="rate-chip">1 ${selTo} = <b>${fmt(1/rate, selFrom)} ${selFrom}</b></div>
    `;

    const upd = cache[selFrom]?.updated;
    if (upd) {
      const d = new Date(upd);
      dateEl.textContent = 'Cập nhật: ' + d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
    }

    setStatus(true);
    renderQuick(amt, rates);

  } catch(e) {
    resEl.classList.remove('dim');
    resEl.textContent = '—';
    rateEl.innerHTML = '';
    showErr('⚠ ' + (e.message || 'Không thể lấy tỷ giá. Kiểm tra kết nối mạng.'));
    setStatus(false);
    renderQuick(0, null);
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
(async function init() {
  buildList('from');
  buildList('to');
  renderQuick(0, null);
  setStatus(null);
  try {
    await getRates('USD');
    buildList('from');
    buildList('to');
    await doConvert();
  } catch(e) {
    setStatus(false);
    showErr('⚠ Không thể kết nối API. Kiểm tra mạng và tải lại trang.');
  }
})();
</script>
